name: ethioconfess
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+7

environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  graphql_flutter: ^5.1.2
  riverpod: ^2.6.1
  connectivity_plus: ^6.1.1
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  cupertino_icons: ^1.0.2
  timeago: ^3.6.0
  flutter_dotenv: ^5.0.2
  google_fonts:
  smooth_page_indicator: ^1.2.0+3
  flutter_secure_storage: ^9.2.4
  jwt_decoder:
  json_annotation: ^4.8.1
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3
  http: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  onesignal_flutter: ^5.3.2
  web_socket_channel: ^2.4.0
  sticky_headers: ^0.3.0+2
  image_picker: ^0.8.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  flutter_lints: ^2.0.0
  flutter_quill:
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/metsnagna_forground.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/logo/
    - assets/avatar/
    - .env